<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=arrow_upward" />
    <link rel="stylesheet" href="style.css" />
    <script src="https://unpkg.com/axios@1.13.2/dist/axios.min.js"></script>
    <script src="https://unpkg.com/typewriter-effect@latest/dist/core.js"></script>
    <title>AI API</title>
</head>
<body>
    <div class="container">
    <h1 id="head"></h1>
        <form id="ask-form">
            <input type="search" placeholder="Ask any topic (i.e: Love, Wine or Italy)" class="ask-input" id="ask-input" autofocus required autocomplete="off"/>
            <input type="submit" value="Send" class="send-button" id="send-button" />
        </form>
        <div class="answer-output hidden" id="answer-output"></div>
        <footer>
            <p>This AI project was coded by <a href="https://github.com/revelation4825-tech" target="_blank">Dana K</a> and is <a href="https://github.com/revelation4825-tech/AI-poem-Generator-4" target="_blank">open-sourced on GitHub</a> and is <a href="https://ai-poem-generatorr-4.netlify.app/" target="_blank">hosted on Netlify.</a></p>
        </footer>
    </div>
</body>
    <script src="app.js"></script>
</html>
